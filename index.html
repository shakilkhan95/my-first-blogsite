<!DOCTYPE html>
<html lang="en">
    <!-- this is head section -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Travel Blog</title>

    <style>
        .container{
            width: 90%;
            height: 90vh;
            margin: 0 auto;
            padding: 5px;
            display: flex;
            gap: 5px;
            border: 2px solid black;
            border-radius: 5px;
        }

        .left{
            width: 30%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 5px;
            background-color: aquamarine;
        }

        .right{
            width: 70%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 5px;
            background-color: tomato;
        }
        .hidden{
            display: none;
        }

        @media screen and (max-width: 576px) {
            .container{
                flex-direction: column;
                height: 90vh;
            }

            .container .left{
                width: 100%;
                height: 30vh;
            }

            .container .right{
                width: 100%;
                height: 70vh;
            }
        }
    </style>
</head>

<!-- this is body section  -->
<body>
    <section class="container">
        <div id="left" class="left">Left</div>
        <div id="right" class="right">right</div>
    </section>

    <ul>
        <li>Home</li>
        <li>Portfolio</li>
        <li>Services</li>
        <li>Contact Me</li>
    </ul>


    <script src="practice.js"></script>
</body>
</html>
